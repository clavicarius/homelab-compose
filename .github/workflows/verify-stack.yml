name: Verify Stack

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  discover:
    name: Discover Compose Stacks
    runs-on: ubuntu-latest
    outputs:
      stacks: ${{ steps.discover.outputs.stacks }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Discover stacks
        id: discover
        shell: bash
        run: |
          stacks=$(find . \
            -mindepth 2 \
            -maxdepth 3 \
            \( \
              -name "docker-compose.yml" \
              -o \
              -name "compose.yml" \
            \) \
            -printf '%h\n' \
            | sed 's|^\./||' \
            | sort -u \
            | jq -R -s -c 'split("\n")[:-1]')

          echo "Detected stacks:"
          echo "$stacks"
          echo "stacks=$stacks" >> "$GITHUB_OUTPUT"

  verify:
    name: Verify ${{ matrix.stack }}
    needs:
      - discover
    if: needs.discover.outputs.stacks != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        stack: ${{ fromJson(needs.discover.outputs.stacks) }}
    defaults:
      run:
        working-directory: ${{ matrix.stack }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare CI environment
        shell: bash
        run: |
          rm -f .env.ci

          FOUND=0

          if [ -f "../.env.common.example" ]; then
            cat ../.env.common.example >> .env.ci
            echo "" >> .env.ci
            FOUND=1
          fi

          if [ -f ".env.example" ]; then
            cat .env.example >> .env.ci
            echo "" >> .env.ci
            FOUND=1
          fi

          if [ "$FOUND" -eq 0 ]; then
            echo "No environment file found."
            exit 1
          fi

          echo "Using environment:"
          cat .env.ci

      - name: Validate compose file
        run: |
          docker compose --env-file .env.ci config

      - name: Start stack
        run: |
          docker compose \
            --env-file .env.ci \
            up -d --wait

      - name: Check container status
        shell: bash
        run: |
          docker compose --env-file .env.ci ps

          FAILED=$(docker compose --env-file .env.ci ps --format json |
            jq -r '
              select(
                .State != "running"
                or (.Health? != null and .Health != "healthy")
              )
              | .Name
            ')

          if [ -n "$FAILED" ]; then
            echo "The following containers failed:"
            echo "$FAILED"

            docker compose --env-file .env.ci logs --no-color

            exit 1
          fi

      - name: Run healthcheck script
        shell: bash
        run: |
          if [ -f healthcheck.sh ]; then
            chmod +x healthcheck.sh
            ./healthcheck.sh
          else
            echo "No custom healthcheck defined"
          fi

      - name: Show logs on failure
        if: failure()
        run: |
          docker compose --env-file .env.ci logs --no-color

      - name: Cleanup
        if: always()
        run: |
          docker compose \
            --env-file .env.ci \
            down \
            --volumes \
            --remove-orphans

          rm -f .env.ci

  verify-success:
    name: Verify Compose Stacks

    needs:
      - verify

    if: always()

    runs-on: ubuntu-latest

    steps:
      - name: Check verification result
        shell: bash
        run: |
          if [ "${{ needs.verify.result }}" != "success" ] \
             && [ "${{ needs.verify.result }}" != "skipped" ]; then
            echo "Compose verification failed"
            exit 1
          fi

          echo "All compose stacks verified successfully"