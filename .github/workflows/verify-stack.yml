name: Verify Stack

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

permissions:
  contents: read

jobs:

  discover:
    name: Discover Compose Stacks
    runs-on: ubuntu-latest

    outputs:
      stacks: ${{ steps.discover.outputs.stacks }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Discover stacks
        id: discover
        shell: bash
        run: |
          stacks=$(find . \
            -mindepth 1 \
            -maxdepth 1 \
            -type d \
            ! -name ".git" \
            ! -name ".github" \
            | sed 's|^\./||' \
            | jq -R -s -c 'split("\n")[:-1]')

          echo "Detected stacks:"
          echo "$stacks"

          echo "stacks=$stacks" >> "$GITHUB_OUTPUT"


  verify:

    name: Verify ${{ matrix.stack }}

    needs:
      - discover

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false

      matrix:
        stack: ${{ fromJson(needs.discover.outputs.stacks) }}


    defaults:
      run:
        working-directory: ${{ matrix.stack }}


    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Validate compose file
        run: |
          docker compose config


      - name: Start stack
        run: |
          docker compose up -d


      - name: Wait for startup
        run: |
          sleep 20


      - name: Check container status
        run: |
          docker compose ps

          if docker compose ps --status exited | grep -q .; then
            echo "Container failed to start"
            exit 1
          fi


      - name: Run healthcheck
        run: |
          if [ -f healthcheck.sh ]; then
            chmod +x healthcheck.sh
            ./healthcheck.sh
          else
            echo "No healthcheck defined"
          fi


      - name: Show logs on failure
        if: failure()
        run: |
          docker compose logs


      - name: Cleanup
        if: always()
        run: |
          docker compose down -v



  # Dieser Job ist der einzige Required Check
  verify-success:

    name: Verify Compose Stacks

    needs:
      - verify

    runs-on: ubuntu-latest


    steps:

      - name: Verification successful
        run: |
          echo "All compose stacks verified successfully"
