# ${ADGUARD_HOST}.${HOMELAB_DOMAIN}
# docker compose file for adguard

services:
  adguardhome:
    container_name: adguard-homelab
    # https://hub.docker.com/r/adguard/adguardhome/tags
    image: adguard/adguardhome:latest
    restart: unless-stopped
    networks:
      adguard_net:
        ipv4_address: ${ADGUARD_IP}  # fixe IP
    volumes:
      - ./conf:/opt/adguardhome/conf
      - ./work:/opt/adguardhome/work
    ports:
      - "53:53/tcp"
      - "53:53/udp" # dns
      - "${ADGUARD_PORT}:9080" # web-ui

    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    
    labels:
    
      
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:9080/ || exit 1"] 
      interval: 30s
      timeout: 10s
      retries: 8

networks:
  adguard_net:
    driver: bridge
    ipam: 
      config:
        - subnet: ${SUBNET}
        - gateway: ${GATEWAY}
